    <line x1="48" y1="68" x2="220" y2="68" stroke="#D9899E" stroke-width="0.5" opacity="0.2" style="fill:rgb(0, 0, 0);stroke:rgb(217, 137, 158);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.2;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Dropper bottle silhouette -->
