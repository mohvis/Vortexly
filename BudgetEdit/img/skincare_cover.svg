    <text font-family="Georgia, serif" font-size="11" fill="#F8F0F2" x="98" y="157" text-anchor="middle" font-weight="600" letter-spacing="1" style="fill:rgb(248, 240, 242);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:11px;font-weight:600;text-anchor:middle;dominant-baseline:auto">SKINCARE</text>
    <!-- Main headline -->
    <text font-family="Georgia, serif" font-size="46" fill="#3A1A24" x="48" y="228" font-weight="400" style="fill:rgb(58, 26, 36);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:46px;font-weight:400;text-anchor:start;dominant-baseline:auto">10 Best</text>
    <text font-family="Georgia, serif" font-size="46" fill="#3A1A24" x="48" y="279" font-weight="400" style="fill:rgb(58, 26, 36);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:46px;font-weight:400;text-anchor:start;dominant-baseline:auto">Skincare Picks</text>
    <!-- Sub headline -->
    <text font-family="Georgia, serif" font-size="17" fill="#8A4A5E" x="48" y="315" font-style="italic" style="fill:rgb(138, 74, 94);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:17px;font-weight:400;font-style:italic;text-anchor:start;dominant-baseline:auto">Beginner-friendly · All on Amazon</text>
    <!-- Decorative dash -->
    <line x1="48" y1="332" x2="160" y2="332" stroke="#C97090" stroke-width="1.5" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(201, 112, 144);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Meta -->
    <text font-family="Georgia, serif" font-size="12" fill="#A07080" x="48" y="372" letter-spacing="0.5" style="fill:rgb(160, 112, 128);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">vortexly · 8 min read</text>
    <!-- Small sparkle accents -->
    <text font-size="16" x="160" y="100" fill="#D9899E" opacity="0.4" style="fill:rgb(217, 137, 158);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">✦</text>
    <text font-size="10" x="190" y="82" fill="#D9899E" opacity="0.3" style="fill:rgb(217, 137, 158);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:10px;font-weight:400;text-anchor:start;dominant-baseline:auto">✦</text>
  </g>
